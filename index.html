<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Frota</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="imagens/logo.png">    
    <link rel="icon" sizes="192x192" href="imagens/logo.png">
    <meta name="theme-color" content="#0056b3">
    <link rel="manifest" href="manifes.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div class="container">
        <header class="header-logo">
            <div class="logo-container">
                <img src="imagens/logo.png" alt="Logo Empresa" id="logoEmpresa">
            </div>
            <h1 class+"titulo-sistema">Controle de Frota</h1>
        </header>

        <section class="card-painel">
            <h3>Registrar Saída</h3>
            
            <div class="grupo-input">
                <label>Data e Hora de Saída</label>
                <div class="linha-dupla">
                    <input type="date" id="dataSaida" readonly class="input-automatico">
                    <input type="time" id="horaSaida" readonly class="input-automatico">
                </div>
            </div>

            <div class="grupo-input">
                <label>Veículo</label>
                <select id="placaVeiculo">
                    <option value="">Selecione o Veículo</option>
                    <option value="Argo RVX0F35">Argo RVX0F35</option>
                    <option value="Argo RVX0F37">Argo RVX0F37</option>
                    <option value="Ducato PYI2E43">Ducato PYI2E43</option>
                </select>
            </div>

            <div class="grupo-input">
                <label>Motorista</label>
                <select id="selectMotorista">
                    <option value="">Selecione o Motorista</option>
                    <option value="Marcelo">Marcelo Motta Cardoso</option>
                    <option value="Daniela Claudia">Daniela Claudia</option>
                    <option value="Gabriel Louida Da Cunha Porto">Gabriel Louid da Cunha Porto</option>
                    <option value="Carlos Eduardo de Faria">Carlos Eduardo de Faria</option>
                    <option value="Gracy Theodoro Juniorr">Gracy Theodoro Junior</option>
                    <option value="Grace Melody Maciel">Grace Melody Maciel</option>
                    <option value="Ricardo Marçal da Silva">Ricardo Marçal da Silva</option>
                    <option value="Roberto Assis Silva">Roberto Assis Silva</option>
                    <option value="Rafael Gonçalves Rodrigues">Rafael Gonçalves Rodrigues</option>
                </select>
            </div>

            <div class="grupo-input">
                <label>Quilometragem Inicial</label>
                <input type="number" id="kmSaida" placeholder="Ex: 12500">
            </div>

            <div class="grupo-input">
                <label>Motivo</label>
                <select id="motivoSelecao">
                    <option value="">Selecione o motivo...</option>
                    <option value="entrega">Entrega</option>
                    <option value="outros">Outros Motivos</option>
                </select>
            </div>

            <div id="camposEntrega" style="display: none;" class="area-dinamica">
                <input type="text" id="nf" placeholder="Número da NF">
                <input type="number" id="valorNf" placeholder="Valor da NF (R$)">
            </div>

            <div id="camposOutros" style="display: none;" class="area-dinamica">
                <textarea id="descricaoMotivo" placeholder="Descreva o motivo..."></textarea>
            </div>

            <button type="button" class="btn-principal" id="btnLancar">LANÇAR SAÍDA</button>
        </section>

        <div class="divisor"></div>
        <h3>Veículos em Trânsito</h3>
        <div id="containerCards"></div>

        <div class="divisor"></div>
        <h3>Histórico (Concluídos)</h3>
        <div id="containerHistorico"></div>

        <div class="area-acoes">
        <button id="btnExportar" class="btn-excel">BAIXAR EXCEL (HISTÓRICO)</button>
        </div>
        <div id="containerHistorico"></div>


    </div>

    <div id="modalRetorno" class="modal" style="display: none;">
        <div class="modal-content">
            <h3 id="labelVeiculoModal">Finalizar</h3>
            <div class="linha-dupla">
                <input type="date" id="dataRetorno" readonly class="input-automatico">
                <input type="time" id="horaRetorno" readonly class="input-automatico">
            </div>
            <input type="number" id="kmRetorno" placeholder="Digite o KM Final">
            <button class="btn-principal" id="btnConfirmar">CONFIRMAR CHEGADA</button>
            <button class="btn-secundario" id="btnFecharModal">VOLTAR</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>

</html>
